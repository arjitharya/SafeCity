// src/pages/events.jsx
import { useState, useEffect } from 'react';
import {
  X, Plus, Edit, Trash2, Copy, Calendar, MapPin, Image as ImageIcon,
  Video, Ticket, Star, Clock, AlertTriangle, UploadCloud, Loader2,
} from 'lucide-react';
import supabase from '../utils/supabase';

const CATEGORIES = ['Music', 'Cultural', 'Tech', 'Food', 'Sports', 'Art', 'Other'];
const TIMEZONES = ['Asia/Tokyo', 'Asia/Seoul', 'Asia/Shanghai', 'America/New_York', 'Europe/London'];
const SALES_STATUSES = [
  { value: 'available',   label: 'Available',   color: 'bg-green-100 text-green-800' },
  { value: 'sold_out',    label: 'Sold Out',    color: 'bg-red-100 text-red-800'    },
  { value: 'coming_soon', label: 'Coming Soon', color: 'bg-amber-100 text-amber-800' },
  { value: 'ended',       label: 'Ended',       color: 'bg-gray-100 text-gray-800'   },
];
const LANGUAGE_OPTIONS = ['EN', 'JP', 'Hindi', 'Tamil', 'Chinese', 'Korean', 'Thai'];

// ────────────────────────────────────────────────
export default function Events() {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);

  const [isDrawerOpen, setIsDrawerOpen] = useState(false);
  const [currentEvent, setCurrentEvent] = useState(null);
  const [formData, setFormData] = useState({});
  const [formErrors, setFormErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [uploading, setUploading] = useState(false);

  // Filters
  const [searchTerm, setSearchTerm] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [salesFilter, setSalesFilter] = useState('all');
  const [featuredOnly, setFeaturedOnly] = useState(false);

  // ────────────────────────────────────────────────
  // Fetch events from Supabase
  // ────────────────────────────────────────────────
  useEffect(() => {
    async function loadEvents() {
      try {
        setLoading(true);
        const { data, error } = await supabase
          .from('events')
          .select('*')
          .order('start_at', { ascending: true });

        if (error) throw error;
        setEvents(data || []);
      } catch (err) {
        console.error(err);
        setFetchError(err.message || 'Failed to load events');
      } finally {
        setLoading(false);
      }
    }

    loadEvents();
  }, []);

  // ────────────────────────────────────────────────
  // Filtered events (this is the variable you need)
  // ────────────────────────────────────────────────
  const filteredEvents = events.filter((ev) => {
    const matchesSearch =
      ev.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
      ev.city?.toLowerCase().includes(searchTerm.toLowerCase());
    const matchesStatus = statusFilter === 'all' || ev.status === statusFilter;
    const matchesSales = salesFilter === 'all' || ev.sales_status === salesFilter;
    const matchesFeatured = !featuredOnly || ev.featured === true;
    return matchesSearch && matchesStatus && matchesSales && matchesFeatured;
  });

  // ────────────────────────────────────────────────
  // Drawer Handlers
  // ────────────────────────────────────────────────
  const openNew = () => {
    setCurrentEvent(null);
    setFormData({
      status: 'draft',
      sales_status: 'coming_soon',
      featured: false,
      timezone: 'Asia/Tokyo',
      language_tags: [],
      badges: [],
      posterFile: null,
      posterPreview: null,
      heroFile: null,
      heroPreview: null,
      trailerFile: null,
      trailerPreview: null,
    });
    setFormErrors({});
    setSubmitted(false);
    setIsDrawerOpen(true);
  };

  const openEdit = (event) => {
    setCurrentEvent(event);
    setFormData({
      ...event,
      posterFile: null,
      posterPreview: null,
      heroFile: null,
      heroPreview: null,
      trailerFile: null,
      trailerPreview: null,
    });
    setFormErrors({});
    setSubmitted(false);
    setIsDrawerOpen(true);
  };

  const closeDrawer = () => {
    setIsDrawerOpen(false);
  };

  // Cleanup previews
  useEffect(() => {
    return () => {
      ['posterPreview', 'heroPreview', 'trailerPreview'].forEach((key) => {
        if (formData[key]) URL.revokeObjectURL(formData[key]);
      });
    };
  }, [formData]);

  // ────────────────────────────────────────────────
  // Slug generator
  // ────────────────────────────────────────────────
  const generateSlug = () => {
    if (!formData.title?.trim()) return;
    const slug = formData.title
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
    setFormData((prev) => ({ ...prev, slug }));
  };

  // ────────────────────────────────────────────────
  // Form change
  // ────────────────────────────────────────────────
  const handleChange = (e) => {
    const { name, value, type, checked } = e.target;
    setFormData((prev) => ({
      ...prev,
      [name]: type === 'checkbox' ? checked : value,
    }));
    if (formErrors[name]) {
      setFormErrors((prev) => ({ ...prev, [name]: undefined }));
    }
  };

  // ────────────────────────────────────────────────
  // File change → local preview
  // ────────────────────────────────────────────────
  const handleFile = (e, prefix) => {
    const file = e.target.files?.[0];
    if (!file) return;

    const preview = URL.createObjectURL(file);
    setFormData((prev) => ({
      ...prev,
      [`${prefix}File`]: file,
      [`${prefix}Preview`]: preview,
      [`${prefix}_image_url`]: '',
      [`${prefix}_url`]: '',
    }));
  };

  // ────────────────────────────────────────────────
  // Upload to Supabase Storage
  // ────────────────────────────────────────────────
  const uploadFile = async (file, folder) => {
    if (!file) return null;

    const ext = file.name.split('.').pop();
    const path = `${folder}/${crypto.randomUUID()}.${ext}`;

    const { error } = await supabase.storage.from('event-media').upload(path, file);
    if (error) throw error;

    const { data } = supabase.storage.from('event-media').getPublicUrl(path);
    return data.publicUrl;
  };

  // ────────────────────────────────────────────────
  // Badge / Language helpers
  // ────────────────────────────────────────────────
  const addBadge = () => {
    const input = document.getElementById('badge-input');
    const val = input?.value.trim();
    if (!val || (formData.badges || []).includes(val)) return;
    setFormData((prev) => ({
      ...prev,
      badges: [...(prev.badges || []), val].slice(0, 8),
    }));
    if (input) input.value = '';
  };

  const removeBadge = (badge) => {
    setFormData((prev) => ({
      ...prev,
      badges: (prev.badges || []).filter((b) => b !== badge),
    }));
  };

  const toggleLanguage = (lang) => {
    setFormData((prev) => {
      const tags = prev.language_tags || [];
      return {
        ...prev,
        language_tags: tags.includes(lang) ? tags.filter((l) => l !== lang) : [...tags, lang],
      };
    });
  };

  // ────────────────────────────────────────────────
  // Validation
  // ────────────────────────────────────────────────
  const validate = () => {
    const errs = {};

    if (!formData.title?.trim()) errs.title = 'Required';
    if (!formData.slug?.trim()) errs.slug = 'Required';
    if (!formData.status) errs.status = 'Required';
    if (!formData.category?.trim()) errs.category = 'Required';
    if (!formData.start_at) errs.start_at = 'Required';
    if (!formData.city?.trim()) errs.city = 'Required';
    if (!formData.venue_name?.trim()) errs.venue_name = 'Required';
    if (!formData.poster_image_url && !formData.posterFile) errs.poster_image_url = 'Required';
    if (!formData.ticket_url?.trim()) errs.ticket_url = 'Required';
    if (!formData.sales_status) errs.sales_status = 'Required';

    setFormErrors(errs);
    return Object.keys(errs).length === 0;
  };

  // ────────────────────────────────────────────────
  // Save handler
  // ────────────────────────────────────────────────
  const handleSave = async () => {
    setSubmitted(true);
    if (!validate()) return;

    setUploading(true);

    let data = { ...formData };

    try {
      if (formData.posterFile) {
        const url = await uploadFile(formData.posterFile, 'posters');
        if (url) data.poster_image_url = url;
      }
      if (formData.heroFile) {
        const url = await uploadFile(formData.heroFile, 'heroes');
        if (url) data.hero_image_url = url;
      }
      if (formData.trailerFile) {
        const url = await uploadFile(formData.trailerFile, 'trailers');
        if (url) data.trailer_video_url = url;
      }

      const payload = {
        title: data.title,
        slug: data.slug,
        status: data.status,
        category: data.category,
        start_at: data.start_at,
        end_at: data.end_at || null,
        timezone: data.timezone,
        city: data.city,
        venue_name: data.venue_name,
        venue_area: data.venue_area || null,
        venue_address: data.venue_address || null,
        google_maps_url: data.google_maps_url || null,
        poster_image_url: data.poster_image_url || null,
        hero_image_url: data.hero_image_url || null,
        trailer_video_url: data.trailer_video_url || null,
        image_alt: data.image_alt || null,
        ticket_url: data.ticket_url,
        sales_status: data.sales_status,
        ticket_provider: data.ticket_provider || null,
        cta_label: data.cta_label || 'Get Tickets',
        price_range: data.price_range || null,
        capacity: data.capacity ? Number(data.capacity) : null,
        remaining_tickets: data.remaining_tickets ? Number(data.remaining_tickets) : null,
        featured: !!data.featured,
        priority: data.priority ? Number(data.priority) : 10,
        badges: data.badges || [],
        language_tags: data.language_tags || [],
        short_description: data.short_description || null,
        age_guidance: data.age_guidance || null,
        duration_minutes: data.duration_minutes ? Number(data.duration_minutes) : null,
        notes: data.notes || null,
      };

      let res;

      if (currentEvent) {
        res = await supabase.from('events').update(payload).eq('id', currentEvent.id).select().single();
      } else {
        res = await supabase.from('events').insert(payload).select().single();
      }

      if (res.error) throw res.error;

      if (currentEvent) {
        setEvents((prev) => prev.map((ev) => (ev.id === currentEvent.id ? res.data : ev)));
      } else {
        setEvents((prev) => [res.data, ...prev]);
      }

      closeDrawer();
    } catch (err) {
      alert('Save failed: ' + err.message);
    } finally {
      setUploading(false);
    }
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Delete permanently?')) return;
    const { error } = await supabase.from('events').delete().eq('id', id);
    if (error) alert(error.message);
    else setEvents((prev) => prev.filter((ev) => ev.id !== id));
  };

  const handleDuplicate = async (event) => {
    const copy = {
      ...event,
      id: crypto.randomUUID(),
      title: `${event.title} (Copy)`,
      slug: `${event.slug}-copy-${Date.now()}`,
      status: 'draft',
    };
    const { data, error } = await supabase.from('events').insert(copy).select().single();
    if (error) alert(error.message);
    else setEvents((prev) => [data, ...prev]);
  };

  const renderTrailer = (url) => {
    if (!url) return null;
    if (url.includes('youtube.com') || url.includes('youtu.be')) {
      const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
      return (
        <iframe
          width="100%"
          height="315"
          src={`https://www.youtube.com/embed/${id}`}
          title="Trailer"
          frameBorder="0"
          allowFullScreen
          className="rounded-xl mt-3"
        />
      );
    }
    return <video src={url} controls className="w-full max-h-80 rounded-xl mt-3 bg-black" />;
  };

  if (loading) {
    return (
      <div className="flex items-center justify-center min-h-[60vh]">
        <Loader2 className="h-10 w-10 animate-spin text-blue-600" />
      </div>
    );
  }

  if (fetchError) {
    return (
      <div className="p-8 text-center text-red-600">
        <AlertTriangle className="mx-auto h-12 w-12 mb-4" />
        <h2 className="text-xl font-bold">Error</h2>
        <p>{fetchError}</p>
      </div>
    );
  }

  return (
    <div className="space-y-8 p-4 md:p-6 lg:p-8 bg-gray-50 min-h-screen">
      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <h1 className="text-3xl font-bold text-gray-900">Events</h1>
          <p className="text-gray-600 mt-1">Manage your events</p>
        </div>
        <button
          onClick={openNew}
          disabled={uploading}
          className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium shadow disabled:opacity-60 transition"
        >
          <Plus size={20} /> New Event
        </button>
      </div>

      <div className="flex flex-wrap gap-3 bg-white p-4 rounded-2xl border shadow-sm">
        <input
          type="text"
          placeholder="Search title or city..."
          value={searchTerm}
          onChange={(e) => setSearchTerm(e.target.value)}
          className="flex-1 min-w-[240px] rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
        />
        <select
          value={statusFilter}
          onChange={(e) => setStatusFilter(e.target.value)}
          className="rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
        >
          <option value="all">All Status</option>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
        </select>
        <select
          value={salesFilter}
          onChange={(e) => setSalesFilter(e.target.value)}
          className="rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
        >
          <option value="all">All Sales</option>
          {SALES_STATUSES.map((s) => (
            <option key={s.value} value={s.value}>
              {s.label}
            </option>
          ))}
        </select>
        <label className="flex items-center gap-2 px-5 py-3 rounded-xl border cursor-pointer hover:bg-gray-50">
          <input
            type="checkbox"
            checked={featuredOnly}
            onChange={(e) => setFeaturedOnly(e.target.checked)}
            className="w-4 h-4 accent-blue-600"
          />
          <span className="text-sm font-medium text-gray-700">Featured only</span>
        </label>
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 shadow overflow-hidden">
        <div className="overflow-x-auto">
          <table className="min-w-full divide-y divide-gray-200">
            <thead className="bg-gray-50">
              <tr>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase w-24">Poster</th>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Event</th>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">City</th>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Start</th>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                <th className="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Sales</th>
                <th className="px-6 py-4 text-center text-xs font-medium text-gray-500 uppercase">Featured</th>
                <th className="px-6 py-4 text-right text-xs font-medium text-gray-500 uppercase w-32">Actions</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-200">
              {filteredEvents.length === 0 ? (
                <tr>
                  <td colSpan={8} className="py-20 text-center text-gray-500">
                    <Calendar className="mx-auto h-12 w-12 text-gray-400 mb-4" />
                    <p className="text-lg font-medium">No events found</p>
                    <p className="mt-2">Create your first event.</p>
                  </td>
                </tr>
              ) : (
                filteredEvents.map((event) => (
                  <tr
                    key={event.id}
                    className="hover:bg-gray-50 transition-colors cursor-pointer group"
                    onClick={() => openEdit(event)}
                  >
                    <td className="px-6 py-4">
                      {event.poster_image_url ? (
                        <img
                          src={event.poster_image_url}
                          alt={event.image_alt || event.title}
                          className="h-14 w-14 object-cover rounded-xl border"
                        />
                      ) : (
                        <div className="h-14 w-14 bg-gray-100 rounded-xl flex items-center justify-center">
                          <ImageIcon size={20} className="text-gray-400" />
                        </div>
                      )}
                    </td>
                    <td className="px-6 py-4">
                      <div className="font-semibold">{event.title}</div>
                      <div className="text-xs text-gray-500">/{event.slug}</div>
                    </td>
                    <td className="px-6 py-4 text-gray-600">{event.city}</td>
                    <td className="px-6 py-4 text-gray-600">
                      {new Date(event.start_at).toLocaleString([], {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                      })}
                    </td>
                    <td className="px-6 py-4">
                      <span
                        className={`inline-flex px-3 py-1 rounded-full text-xs font-medium ${
                          event.status === 'published' ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'
                        }`}
                      >
                        {event.status}
                      </span>
                    </td>
                    <td className="px-6 py-4">
                      <span
                        className={`inline-flex px-3 py-1 rounded-full text-xs font-medium ${
                          SALES_STATUSES.find((s) => s.value === event.sales_status)?.color || 'bg-gray-100 text-gray-800'
                        }`}
                      >
                        {SALES_STATUSES.find((s) => s.value === event.sales_status)?.label || event.sales_status}
                      </span>
                    </td>
                    <td className="px-6 py-4 text-center">
                      {event.featured && <Star className="inline text-amber-500" size={18} fill="currentColor" />}
                    </td>
                    <td className="px-6 py-4 text-right" onClick={(e) => e.stopPropagation()}>
                      <div className="flex justify-end gap-2">
                        <button
                          onClick={() => openEdit(event)}
                          className="p-2 text-blue-600 hover:bg-blue-50 rounded-xl"
                        >
                          <Edit size={18} />
                        </button>
                        <button
                          onClick={() => handleDuplicate(event)}
                          className="p-2 text-gray-600 hover:bg-gray-100 rounded-xl"
                        >
                          <Copy size={18} />
                        </button>
                        <button
                          onClick={() => handleDelete(event.id)}
                          className="p-2 text-red-600 hover:bg-red-50 rounded-xl"
                        >
                          <Trash2 size={18} />
                        </button>
                      </div>
                    </td>
                  </tr>
                ))
              )}
            </tbody>
          </table>
        </div>
      </div>

      {/* DRAWER */}
      <div
        className={`fixed inset-y-0 right-0 z-50 w-full max-w-3xl bg-white shadow-2xl transform transition-transform duration-300 ease-in-out ${
          isDrawerOpen ? 'translate-x-0' : 'translate-x-full'
        }`}
      >
        <div className="h-full flex flex-col">
          <div className="px-8 py-6 border-b flex items-center justify-between bg-white sticky top-0 z-10">
            <div>
              <h2 className="text-2xl font-bold text-gray-900">
                {currentEvent ? 'Edit Event' : 'Create Event'}
              </h2>
              <p className="text-sm text-gray-500 mt-1">* Required</p>
            </div>
            <button onClick={closeDrawer} className="p-3 hover:bg-gray-100 rounded-full">
              <X size={28} />
            </button>
          </div>

          {/* Scrollable content */}
          <div className="flex-1 overflow-y-auto px-8 py-10 space-y-14 pb-32">
            {/* SECTION 1: Basic Info */}
            <section>
              <div className="flex items-center gap-4 mb-6">
                <div className="w-10 h-10 rounded-2xl bg-blue-100 flex items-center justify-center">
                  <Tag className="text-blue-600" size={22} />
                </div>
                <h3 className="text-2xl font-semibold text-gray-900">Basic Information</h3>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Event Title <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="text"
                    name="title"
                    value={formData.title || ''}
                    onChange={handleChange}
                    className={`w-full rounded-xl border ${formErrors.title && submitted ? 'border-red-400 ring-red-200' : 'border-gray-300'} px-5 py-3 focus:border-blue-500 focus:ring-1 outline-none transition`}
                  />
                  {formErrors.title && submitted && <p className="mt-1.5 text-red-600 text-sm">{formErrors.title}</p>}
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Slug <span className="text-red-500">*</span>
                  </label>
                  <div className="flex gap-3">
                    <input
                      type="text"
                      name="slug"
                      value={formData.slug || ''}
                      onChange={handleChange}
                      className={`flex-1 rounded-xl border ${formErrors.slug && submitted ? 'border-red-400 ring-red-200' : 'border-gray-300'} px-5 py-3 focus:border-blue-500 focus:ring-1 outline-none transition`}
                    />
                    <button
                      type="button"
                      onClick={generateSlug}
                      className="px-6 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition"
                    >
                      Generate
                    </button>
                  </div>
                  {formErrors.slug && submitted && <p className="mt-1.5 text-red-600 text-sm">{formErrors.slug}</p>}
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Status <span className="text-red-500">*</span>
                  </label>
                  <div className="flex gap-3">
                    {['draft', 'published'].map(s => (
                      <button
                        key={s}
                        type="button"
                        onClick={() => setFormData(prev => ({ ...prev, status: s }))}
                        className={`flex-1 py-3 rounded-xl text-sm font-medium transition ${
                          formData.status === s
                            ? 'bg-blue-600 text-white shadow-md'
                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                        }`}
                      >
                        {s.charAt(0).toUpperCase() + s.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Category <span className="text-red-500">*</span>
                  </label>
                  <select
                    name="category"
                    value={formData.category || ''}
                    onChange={handleChange}
                    className={`w-full rounded-xl border ${formErrors.category && submitted ? 'border-red-400' : 'border-gray-300'} px-5 py-3 focus:border-blue-500 outline-none`}
                  >
                    <option value="">Select category</option>
                    {CATEGORIES.map(cat => (
                      <option key={cat} value={cat}>{cat}</option>
                    ))}
                  </select>
                  {formErrors.category && submitted && <p className="mt-1.5 text-red-600 text-sm">{formErrors.category}</p>}
                </div>

                <div className="md:col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Short Description</label>
                  <textarea
                    name="short_description"
                    value={formData.short_description || ''}
                    onChange={handleChange}
                    maxLength={180}
                    rows={4}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none resize-y"
                  />
                  <div className="text-right text-xs text-gray-400 mt-1">
                    {(formData.short_description || '').length} / 180
                  </div>
                </div>
              </div>
            </section>

            {/* SECTION 2: Date & Location */}
            <section>
              <div className="flex items-center gap-4 mb-6">
                <div className="w-10 h-10 rounded-2xl bg-blue-100 flex items-center justify-center">
                  <Calendar className="text-blue-600" size={22} />
                </div>
                <h3 className="text-2xl font-semibold text-gray-900">Date & Location</h3>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Start Date & Time <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="datetime-local"
                    name="start_at"
                    value={formData.start_at || ''}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">End Date & Time</label>
                  <input
                    type="datetime-local"
                    name="end_at"
                    value={formData.end_at || ''}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Timezone</label>
                  <select
                    name="timezone"
                    value={formData.timezone || 'Asia/Tokyo'}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  >
                    {TIMEZONES.map(tz => <option key={tz} value={tz}>{tz}</option>)}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    City <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="text"
                    name="city"
                    value={formData.city || ''}
                    onChange={handleChange}
                    className={`w-full rounded-xl border ${formErrors.city && submitted ? 'border-red-400' : 'border-gray-300'} px-5 py-3 focus:border-blue-500 outline-none`}
                  />
                  {formErrors.city && submitted && <p className="mt-1.5 text-red-600 text-sm">{formErrors.city}</p>}
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">
                    Venue Name <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="text"
                    name="venue_name"
                    value={formData.venue_name || ''}
                    onChange={handleChange}
                    className={`w-full rounded-xl border ${formErrors.venue_name && submitted ? 'border-red-400' : 'border-gray-300'} px-5 py-3 focus:border-blue-500 outline-none`}
                  />
                  {formErrors.venue_name && submitted && <p className="mt-1.5 text-red-600 text-sm">{formErrors.venue_name}</p>}
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Venue Area (optional)</label>
                  <input
                    type="text"
                    name="venue_area"
                    value={formData.venue_area || ''}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />
                </div>

                <div className="md:col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Venue Address (optional)</label>
                  <input
                    type="text"
                    name="venue_address"
                    value={formData.venue_address || ''}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />
                </div>

                <div className="md:col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Google Maps URL (optional)</label>
                  <input
                    type="url"
                    name="google_maps_url"
                    value={formData.google_maps_url || ''}
                    onChange={handleChange}
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />
                </div>
              </div>
            </section>

            {/* ── MEDIA SECTION ── */}
            <section>
              <div className="flex items-center gap-4 mb-6">
                <div className="w-10 h-10 rounded-2xl bg-blue-100 flex items-center justify-center">
                  <ImageIcon className="text-blue-600" size={22} />
                </div>
                <h3 className="text-2xl font-semibold text-gray-900">Media</h3>
              </div>

              {/* Poster */}
              <div className="mb-10">
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  Poster Image <span className="text-red-500">*</span>
                </label>
                <div className="flex flex-col sm:flex-row gap-6">
                  <label className="cursor-pointer group w-48">
                    <div
                      className={`aspect-[3/4] rounded-2xl border-2 border-dashed flex items-center justify-center overflow-hidden transition-all ${
                        formData.posterPreview ? 'border-blue-500 bg-blue-50/30 shadow-inner' : 'border-gray-300 hover:border-blue-400 hover:bg-blue-50/20'
                      }`}
                    >
                      {formData.posterPreview ? (
                        <img src={formData.posterPreview} alt="Poster preview" className="w-full h-full object-cover" />
                      ) : (
                        <div className="text-center p-6">
                          <UploadCloud className="mx-auto text-gray-400 group-hover:text-blue-500 mb-3" size={40} />
                          <p className="text-sm text-gray-500">Upload poster</p>
                        </div>
                      )}
                    </div>
                    <input
                      type="file"
                      accept="image/jpeg,image/png,image/webp"
                      className="hidden"
                      onChange={(e) => handleFileSelect(e, 'poster')}
                    />
                  </label>

                  <div className="flex-1 space-y-3">
                    <input
                      type="text"
                      name="poster_image_url"
                      value={formData.poster_image_url || ''}
                      onChange={handleChange}
                      placeholder="Or paste direct URL..."
                      className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                    />
                    {formErrors.poster_image_url && submitted && (
                      <p className="text-red-600 text-sm">{formErrors.poster_image_url}</p>
                    )}
                  </div>
                </div>
              </div>

              {/* Hero */}
              <div className="mb-10">
                <label className="block text-sm font-medium text-gray-700 mb-2">Hero Image (optional)</label>
                <div className="flex flex-col sm:flex-row gap-6">
                  <label className="cursor-pointer group w-64">
                    <div
                      className={`aspect-video rounded-2xl border-2 border-dashed flex items-center justify-center overflow-hidden transition-all ${
                        formData.heroPreview ? 'border-blue-500 bg-blue-50/30 shadow-inner' : 'border-gray-300 hover:border-blue-400 hover:bg-blue-50/20'
                      }`}
                    >
                      {formData.heroPreview ? (
                        <img src={formData.heroPreview} alt="Hero preview" className="w-full h-full object-cover" />
                      ) : (
                        <div className="text-center p-8">
                          <UploadCloud className="mx-auto text-gray-400 group-hover:text-blue-500 mb-3" size={48} />
                          <p className="text-sm text-gray-500">Wide banner recommended</p>
                        </div>
                      )}
                    </div>
                    <input
                      type="file"
                      accept="image/jpeg,image/png,image/webp"
                      className="hidden"
                      onChange={(e) => handleFileSelect(e, 'hero')}
                    />
                  </label>

                  <div className="flex-1">
                    <input
                      type="text"
                      name="hero_image_url"
                      value={formData.hero_image_url || ''}
                      onChange={handleChange}
                      placeholder="Or paste direct URL..."
                      className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                    />
                  </div>
                </div>
              </div>

              {/* Trailer */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Trailer Video (optional)</label>
                <div className="space-y-4">
                  <input
                    type="file"
                    accept="video/mp4,video/webm"
                    onChange={(e) => handleFileSelect(e, 'trailer')}
                    className="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                  />
                  <input
                    type="text"
                    name="trailer_video_url"
                    value={formData.trailer_video_url || ''}
                    onChange={handleChange}
                    placeholder="YouTube link or direct mp4 URL..."
                    className="w-full rounded-xl border border-gray-300 px-5 py-3 focus:border-blue-500 outline-none"
                  />

                  {(formData.trailerPreview || formData.trailer_video_url) && (
                    <div className="mt-4">
                      {formData.trailerPreview ? (
                        <video
                          src={formData.trailerPreview}
                          controls
                          className="w-full max-h-80 rounded-2xl bg-black shadow"
                        />
                      ) : (
                        renderTrailerPreview(formData.trailer_video_url)
                      )}
                    </div>
                  )}
                </div>
              </div>
            </section>

            {/* Remaining sections (Ticketing, Display, Extra) follow the same pattern as before */}
            {/* You can copy-paste them from your previous version or let me know if you want them expanded here too */}

          </div>

          <div className="border-t bg-white px-8 py-6 sticky bottom-0 z-10 flex justify-between items-center">
            {currentEvent && (
              <button
                onClick={() => handleDelete(currentEvent.id)}
                className="text-red-600 hover:text-red-700 font-medium flex items-center gap-2"
              >
                <Trash2 size={18} /> Delete
              </button>
            )}
            <div className="flex gap-4 ml-auto">
              <button
                onClick={closeDrawer}
                disabled={uploading}
                className="px-8 py-3 border rounded-xl hover:bg-gray-50 disabled:opacity-50"
              >
                Cancel
              </button>
              <button
                onClick={handleSave}
                disabled={uploading || (submitted && Object.keys(formErrors).length > 0)}
                className={`px-8 py-3 rounded-xl text-white font-medium transition ${
                  uploading ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'
                }`}
              >
                {uploading ? 'Saving...' : currentEvent ? 'Update' : 'Create'}
              </button>
            </div>
          </div>
        </div>
      </div>

      {isDrawerOpen && <div className="fixed inset-0 bg-black/40 z-40 lg:hidden" onClick={closeDrawer} />}
    </div>
  );
}